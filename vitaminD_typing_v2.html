<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>リベシティ TYPING v2 フリック版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;height:100dvh;overflow:hidden;font-family:'Hiragino Sans','Yu Gothic',monospace;}
canvas{display:block;touch-action:none;}
#inputWrap{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,20,0.97);border-top:2px solid rgba(255,215,0,0.3);padding:8px 12px max(env(safe-area-inset-bottom),8px);display:flex;gap:8px;align-items:center;}
#flickInput{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,215,0,0.6);border-radius:10px;color:#fff;font-size:20px;padding:12px 14px;outline:none;caret-color:#FFD700;}
#tapBtn{background:rgba(255,215,0,0.1);border:1.5px solid #FFD700;border-radius:10px;color:#FFD700;font-size:11px;padding:12px 10px;cursor:pointer;white-space:nowrap;font-weight:bold;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="inputWrap">
  <input id="flickInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="フリックで入力">
  <button id="tapBtn">⌨️<br>開く</button>
</div>
<script>
'use strict';
const cvs=document.getElementById('c');
const ctx=cvs.getContext('2d');
const W=390,H=300;
cvs.width=W;cvs.height=H;

function resize(){
  const vv=window.visualViewport;
  const availH=(vv?vv.height:window.innerHeight)-70;
  const s=Math.min(window.innerWidth/W,availH/H);
  cvs.style.width=W*s+'px';cvs.style.height=H*s+'px';
}
resize();
window.addEventListener('resize',resize);
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);

const AC=new(window.AudioContext||window.webkitAudioContext)();
function osc(f,d,type,v,delay){
  type=type||'sine';v=v||0.22;delay=delay||0;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=f;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.start(t);o.stop(t+d+0.02);
}
const SFX={
  correct:function(){osc(620,0.07,'sine',0.18);},
  wrong:function(){osc(90,0.14,'sawtooth',0.28);},
  wordClear:function(){[523,659,784,1047].forEach(function(f,i){osc(f,0.14,'sine',0.2,i*0.05);});},
  ko:function(){[784,523,392,261].forEach(function(f,i){osc(f,0.2,'sine',0.25,i*0.08);});},
  clear:function(){[523,659,784,1047,1319].forEach(function(f,i){osc(f,0.22,'sine',0.28,i*0.07);});},
  atkHit:function(){osc(80,0.12,'sawtooth',0.2);}
};

var bgm=null;
function startBGM(){
  stopBGM();
  bgm=new Audio('Escort.mp3');bgm.loop=true;bgm.volume=0.45;
  bgm.play().catch(function(){});
}
function stopBGM(){if(bgm){bgm.pause();bgm.currentTime=0;bgm=null;}}

var WORDS=[
  {word:'かぶ',    jp:'📈 株式投資',             dmg:10,lv:1},
  {word:'かね',    jp:'💰 お金を稼げ',             dmg:10,lv:1},
  {word:'きん',    jp:'🥇 ゴールド投資',            dmg:10,lv:1},
  {word:'とうし',  jp:'📊 投資を始めろ',             dmg:12,lv:1},
  {word:'じゆう',  jp:'🕊 自由になれ',               dmg:12,lv:1},
  {word:'しさん',  jp:'🏦 資産を作れ',               dmg:11,lv:1},
  {word:'ふくり',  jp:'✨ 複利の魔法',               dmg:14,lv:1},
  {word:'ほけん',  jp:'⚠️ 保険は最小限に',           dmg:12,lv:1},
  {word:'さぎし',  jp:'🚫 詐欺師を倒せ',             dmg:13,lv:1},
  {word:'しゃっきん',jp:'💀 借金はだめ！',            dmg:16,lv:1},
  {word:'せつやく',  jp:'✂️ 節約の精神',             dmg:16,lv:2},
  {word:'ちょきん',  jp:'💳 貯金する',               dmg:15,lv:2},
  {word:'ふくぎょう',jp:'💼 副業で稼げ',              dmg:20,lv:2},
  {word:'がくしゅう',jp:'📚 学び続けろ',              dmg:18,lv:2},
  {word:'こうどうだ',jp:'⚡ 行動するのみ',             dmg:20,lv:2},
  {word:'にーさかつよう',jp:'💰 NISA活用！',          dmg:24,lv:2},
  {word:'しゅうにゅう',jp:'💹 収入を増やせ',           dmg:22,lv:2},
  {word:'いでこかつよう',jp:'🏦 iDeCo活用！',         dmg:24,lv:2},
  {word:'ちょうきとうし',  jp:'📈 長期・積立・分散',   dmg:30,lv:3},
  {word:'しさんけいせい',  jp:'🏆 資産形成を始めろ',   dmg:32,lv:3},
  {word:'ふくりのちから',  jp:'⚡ 複利の力を信じろ',   dmg:32,lv:3},
  {word:'おかねのべんきょう',jp:'📖 お金の勉強！',     dmg:36,lv:3},
  {word:'りべしてぃにこい',jp:'🦁 リベシティに来い！', dmg:38,lv:3},
  {word:'しゃっきんはだめ',jp:'🚫 借金はだめだぞ！',   dmg:36,lv:3},
  {word:'じゆうをてにいれろ',jp:'🕊 自由を手に入れろ！',dmg:42,lv:3},
  {word:'しょうほうはつどう',jp:'⚡ 商法発動！！',             dmg:52,lv:4},
  {word:'きょうがいちばんわかいひ',jp:'🔥 今日が一番若い日！',  dmg:70,lv:4},
  {word:'しゃっきんなんかするなよ',jp:'💀 借金なんかするなよ！',dmg:75,lv:4},
  {word:'おかねのべんきょうをはじめなさい',jp:'今すぐお金の勉強を始めなさい！',dmg:80,lv:4}
];

var STAGES=[
  {name:'毒ローン山',   enemy:'毒ローン男',    hp:120,atk:8, interval:380,lvRange:[1,2],col:'#cc44ff',bg:['#0a0018','#150025']},
  {name:'詐欺師アジト', enemy:'悪徳詐欺師',    hp:220,atk:13,interval:305,lvRange:[1,3],col:'#00ff88',bg:['#001800','#003300']},
  {name:'保険地獄',     enemy:'鬼保険販売員',  hp:340,atk:18,interval:248,lvRange:[2,3],col:'#ff4444',bg:['#0a0000','#200000']},
  {name:'悪徳FP事務所', enemy:'悪徳FPたくまし',hp:480,atk:24,interval:195,lvRange:[2,4],col:'#00ccff',bg:['#001020','#002040']},
  {name:'黒の頂上',     enemy:'ブラック学長',  hp:650,atk:30,interval:162,lvRange:[3,4],col:'#ff0000',bg:['#000000','#100000']}
];

var LS='vitaminD_v2_hs';
function loadHS(){try{return JSON.parse(localStorage.getItem(LS))||{score:0,combo:0};}catch(e){return{score:0,combo:0};}}
function saveHS(s,c){var h=loadHS();localStorage.setItem(LS,JSON.stringify({score:Math.max(h.score,s),combo:Math.max(h.combo,c)}));}

var G={
  phase:'title',stageIdx:0,
  playerHp:100,playerMaxHp:100,dispPlayerHp:100,
  enemyHp:0,enemyMaxHp:0,dispEnemyHp:0,
  score:0,combo:0,comboMax:0,comboTimer:0,
  currentWord:null,typedLen:0,wrongFlash:0,
  wordQueue:[],atkTimer:0,
  playerHurt:0,enemyHurt:0,frameN:0
};

function startStage(idx){
  var st=STAGES[idx];
  G.stageIdx=idx;
  G.enemyHp=st.hp;G.enemyMaxHp=st.hp;G.dispEnemyHp=st.hp;
  G.atkTimer=st.interval;
  G.combo=0;G.comboTimer=0;
  G.wrongFlash=0;G.playerHurt=0;G.enemyHurt=0;G.typedLen=0;
  if(idx===0){G.playerHp=100;G.playerMaxHp=100;G.dispPlayerHp=100;G.score=0;G.comboMax=0;}
  buildQueue();nextWord();
  G.phase='fight';
  startBGM();
  flickInput.value='';flickInput.focus();
}

function buildQueue(){
  var lo=STAGES[G.stageIdx].lvRange[0],hi=STAGES[G.stageIdx].lvRange[1];
  var pool=WORDS.filter(function(w){return w.lv>=lo&&w.lv<=hi;});
  G.wordQueue=pool.slice().sort(function(){return Math.random()-0.5;}).slice(0,8);
}

function nextWord(){
  if(!G.wordQueue.length)buildQueue();
  G.currentWord=G.wordQueue.shift();
  G.typedLen=0;G.wrongFlash=0;
}

var flickInput=document.getElementById('flickInput');
var composing=false;

flickInput.addEventListener('compositionstart',function(){composing=true;});
flickInput.addEventListener('compositionend',function(){
  composing=false;
  setTimeout(function(){processInput(flickInput.value);},10);
});
flickInput.addEventListener('input',function(){processInput(flickInput.value);});

function processInput(val){
  if(G.phase!=='fight'||!G.currentWord)return;
  AC.resume();
  var word=G.currentWord.word;
  var match=0;
  for(var i=0;i<val.length&&i<word.length;i++){
    if(val[i]===word[i]){
      match=i+1;
    }else{
      var gained=match>G.typedLen;
      G.typedLen=match;
      if(gained)SFX.correct();
      G.wrongFlash=18;G.combo=0;G.comboTimer=0;SFX.wrong();
      if(!composing)flickInput.value=word.slice(0,match);
      return;
    }
  }
  if(match>G.typedLen)SFX.correct();
  G.typedLen=match;G.wrongFlash=0;
  if(match>=word.length)wordComplete();
}

function wordComplete(){
  var w=G.currentWord;
  var dmg=w.dmg+Math.min(G.combo,15)*3;
  G.enemyHp=Math.max(0,G.enemyHp-dmg);
  G.score+=dmg*10*(1+Math.floor(G.combo*0.1));
  G.combo++;G.comboTimer=130;G.comboMax=Math.max(G.comboMax,G.combo);
  G.enemyHurt=25;SFX.wordClear();
  flickInput.value='';G.typedLen=0;
  if(G.enemyHp<=0){
    SFX.ko();stopBGM();G.currentWord=null;
    setTimeout(function(){G.phase='stageclear';},800);
  }else{nextWord();}
}

function lerp(a,b,t){return a+(b-a)*t;}

function drawBG(){
  var st=STAGES[Math.min(G.stageIdx,STAGES.length-1)];
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,st.bg[0]);g.addColorStop(1,st.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,46);
  G.dispPlayerHp=lerp(G.dispPlayerHp,G.playerHp,0.12);
  var pr=G.dispPlayerHp/G.playerMaxHp;
  ctx.fillStyle='#1a0000';ctx.fillRect(8,8,155,12);
  ctx.fillStyle='hsl('+(pr*110)+',100%,40%)';ctx.fillRect(8,8,155*pr,12);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(8,8,155,12);
  ctx.fillStyle='#FFD700';ctx.font='bold 8px monospace';ctx.textAlign='left';ctx.fillText('両学長',11,7);
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(G.score,W/2,21);
  ctx.fillStyle='rgba(255,215,0,0.5)';ctx.font='7px monospace';ctx.fillText('SCORE',W/2,31);
  G.dispEnemyHp=lerp(G.dispEnemyHp,G.enemyHp,0.12);
  var er=Math.max(0,G.dispEnemyHp/G.enemyMaxHp);
  var st=STAGES[G.stageIdx];
  ctx.fillStyle='#1a0000';ctx.fillRect(W-163,8,155,12);
  ctx.fillStyle='hsl('+(er*100)+',100%,38%)';ctx.fillRect(W-163+(1-er)*155,8,155*er,12);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(W-163,8,155,12);
  ctx.fillStyle=st.col;ctx.font='bold 8px monospace';ctx.textAlign='right';ctx.fillText(st.enemy,W-11,7);
  ctx.fillStyle='rgba(180,160,255,0.7)';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('STAGE '+(G.stageIdx+1)+'/5',11,36);
  if(G.combo>=2){
    ctx.shadowBlur=10;ctx.shadowColor='#FFD700';ctx.fillStyle='#FFD700';
    ctx.font='bold '+(12+Math.min(G.combo,7))+'px monospace';ctx.textAlign='right';
    ctx.fillText(G.combo+' COMBO!',W-8,36);ctx.shadowBlur=0;
  }
  var ar=G.atkTimer/st.interval;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-70,38,140,5);
  ctx.fillStyle=ar>0.35?'hsl('+(ar*120)+',100%,42%)':'#ff2222';ctx.fillRect(W/2-70,38,140*ar,5);
}

function drawWordPanel(){
  if(!G.currentWord)return;
  var word=G.currentWord.word;
  var px=10,py=54,pw=W-20,ph=H-64;
  ctx.fillStyle=G.wrongFlash>0?'rgba(40,0,0,0.92)':'rgba(0,0,20,0.90)';
  ctx.shadowBlur=G.wrongFlash>0?16:10;
  ctx.shadowColor=G.wrongFlash>0?'#ff2200':'#0033aa';
  ctx.beginPath();ctx.roundRect(px,py,pw,ph,12);ctx.fill();
  ctx.strokeStyle=G.wrongFlash>0?'rgba(255,60,60,0.6)':'rgba(100,150,255,0.3)';
  ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(px,py,pw,ph,12);ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,215,0,0.9)';
  ctx.font='bold 16px "Hiragino Sans","Yu Gothic",monospace';
  ctx.textAlign='center';ctx.fillText(G.currentWord.jp,W/2,py+26);
  ctx.font='bold 44px monospace';
  var chars=word.split('');
  var cws=chars.map(function(c){return ctx.measureText(c).width;});
  var total=cws.reduce(function(a,b){return a+b;},0);
  var cx=W/2-total/2;
  chars.forEach(function(ch,i){
    var cw=cws[i];
    if(i<G.typedLen){ctx.fillStyle='#FFD700';ctx.shadowBlur=10;ctx.shadowColor='#FFD700';}
    else if(i===G.typedLen){ctx.fillStyle='#fff';ctx.shadowBlur=10;ctx.shadowColor='#8888ff';}
    else{ctx.fillStyle='rgba(160,160,195,0.42)';ctx.shadowBlur=0;}
    ctx.fillText(ch,cx+cw/2,py+90);
    cx+=cw;ctx.shadowBlur=0;
  });
  if(G.wrongFlash>0){
    G.wrongFlash--;
    ctx.fillStyle='rgba(255,80,80,0.92)';ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText('✗ ミス！',W/2,py+115);
  }
  if(G.wordQueue.length>0){
    ctx.fillStyle='rgba(110,110,155,0.7)';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('NEXT: '+G.wordQueue[0].word,W/2,py+ph-10);
  }
}

function drawTitle(){
  var t=G.frameN;
  var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#000010');bg.addColorStop(1,'#000018');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(var i=0;i<50;i++){
    var sx=(i*137.5)%W,sy=(i*89.3)%H;
    ctx.globalAlpha=(Math.sin(t*0.03+i)*0.4+0.6)*0.4;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.textAlign='center';
  ctx.fillStyle='rgba(255,215,0,0.7)';ctx.font='10px monospace';ctx.fillText('Vitamin D presents',W/2,38);
  ctx.shadowBlur=26;ctx.shadowColor='#FFD700';
  ctx.fillStyle='#fff';ctx.font='bold 38px "Hiragino Sans","Yu Gothic",monospace';
  ctx.fillText('リベシティ',W/2,82);ctx.shadowBlur=0;
  var hue=(t*1.5)%360;
  ctx.shadowBlur=16;ctx.shadowColor='hsl('+hue+',100%,60%)';
  ctx.fillStyle='hsl('+hue+',100%,65%)';
  ctx.font='bold 22px monospace';ctx.fillText('TYPING v2 フリック版',W/2,114);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(200,180,255,0.8)';ctx.font='12px "Hiragino Sans",monospace';
  ctx.fillText('📱 ひらがなフリック入力で練習！',W/2,142);
  var hs=loadHS();
  ctx.fillStyle='rgba(255,215,0,0.65)';ctx.font='11px monospace';
  ctx.fillText('BEST: '+hs.score+'pts  MAX COMBO: '+hs.combo,W/2,164);
  if(Math.floor(t/22)%2===0){
    var pe='hsl('+((t*2)%360)+',100%,75%)';
    ctx.fillStyle=pe;ctx.shadowBlur=14;ctx.shadowColor=pe;
    ctx.font='bold 13px monospace';ctx.fillText('[ タップしてスタート ]',W/2,194);ctx.shadowBlur=0;
  }
  ctx.fillStyle='rgba(120,120,155,0.5)';ctx.font='9px monospace';
  ctx.fillText('Enterなし・入力したら即判定',W/2,220);
}

function drawStageClear(){
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.shadowBlur=24;ctx.shadowColor='#FFD700';ctx.fillStyle='#FFD700';ctx.font='bold 34px monospace';
  ctx.fillText('STAGE CLEAR!',W/2,H/2-28);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='15px "Hiragino Sans",monospace';
  ctx.fillText(STAGES[G.stageIdx].enemy+'を倒した！',W/2,H/2+10);
  if(G.stageIdx<STAGES.length-1){
    ctx.fillStyle='rgba(100,200,255,0.8)';ctx.font='12px monospace';
    ctx.fillText('NEXT → '+STAGES[G.stageIdx+1].enemy,W/2,H/2+36);
  }
  if(Math.floor(G.frameN/25)%2===0){ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('[ タップで次へ ]',W/2,H/2+60);}
}

function drawGameClear(){
  var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#000010');bg.addColorStop(1,'#001000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.shadowBlur=40;ctx.shadowColor='#FFD700';ctx.fillStyle='#FFD700';ctx.font='bold 34px "Hiragino Sans",monospace';
  ctx.fillText('🔥 FIRE達成！！',W/2,H/2-34);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 13px "Hiragino Sans",monospace';ctx.fillText('今日が人生で一番若い日だ！',W/2,H/2+2);
  ctx.fillStyle='rgba(255,180,0,0.9)';ctx.font='12px monospace';
  ctx.fillText('SCORE: '+G.score+'  MAX COMBO: '+G.comboMax,W/2,H/2+24);
  if(Math.floor(G.frameN/28)%2===0){ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('[ タップでタイトルへ ]',W/2,H/2+50);}
}

function drawGameOver(){
  drawBG();ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.shadowBlur=18;ctx.shadowColor='#5555ff';ctx.fillStyle='#4466ff';ctx.font='bold 44px monospace';
  ctx.fillText('GAME OVER',W/2,H/2-16);ctx.shadowBlur=0;
  ctx.fillStyle='#aaa';ctx.font='13px monospace';ctx.fillText('SCORE: '+G.score,W/2,H/2+22);
  if(Math.floor(G.frameN/28)%2===0){ctx.fillStyle='#aaa';ctx.font='12px monospace';ctx.fillText('[ タップでタイトルへ ]',W/2,H/2+50);}
}

function advance(){
  AC.resume();
  if(G.phase==='title'){startStage(0);}
  else if(G.phase==='stageclear'){
    if(G.stageIdx<STAGES.length-1){startStage(G.stageIdx+1);}
    else{saveHS(G.score,G.comboMax);SFX.clear();G.phase='gameclear';}
  }
  else if(G.phase==='gameclear'||G.phase==='gameover'){
    stopBGM();G.playerHp=100;G.playerMaxHp=100;G.dispPlayerHp=100;G.score=0;G.comboMax=0;G.phase='title';
  }
}

document.addEventListener('keydown',function(e){if(e.code==='Enter')advance();});
cvs.addEventListener('click',advance);
document.getElementById('tapBtn').addEventListener('click',function(e){e.stopPropagation();flickInput.focus();});

function loop(){
  G.frameN++;ctx.clearRect(0,0,W,H);
  if(G.phase==='title'){
    drawTitle();
  }else if(G.phase==='fight'){
    G.atkTimer--;
    if(G.atkTimer<=0){
      var st=STAGES[G.stageIdx];G.atkTimer=st.interval;
      G.playerHp=Math.max(0,G.playerHp-st.atk);G.playerHurt=18;SFX.atkHit();
      if(G.playerHp<=0){saveHS(G.score,G.comboMax);stopBGM();G.phase='gameover';}
    }
    if(G.comboTimer>0){G.comboTimer--;}else if(G.combo>0){G.combo=0;}
    if(G.playerHurt>0)G.playerHurt--;
    if(G.enemyHurt>0)G.enemyHurt--;
    drawBG();drawHUD();drawWordPanel();
  }else if(G.phase==='stageclear'){
    drawBG();drawStageClear();
  }else if(G.phase==='gameclear'){
    drawGameClear();
  }else if(G.phase==='gameover'){
    drawGameOver();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
