const AC=new (window.AudioContext||window.webkitAudioContext)();
const masterGain=AC.createGain();masterGain.gain.value=0.9;masterGain.connect(AC.destination);
const sfxGain=AC.createGain();sfxGain.gain.value=0.7;sfxGain.connect(masterGain);
const bgmGain=AC.createGain();bgmGain.gain.value=0.5;bgmGain.connect(masterGain);

function osc(f,d,type='sine',v=0.3,delay=0,sweep=null,dest=sfxGain){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(dest);o.type=type;
  const t=AC.currentTime+delay;
  if(sweep){o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(sweep,t+d);}
  else o.frequency.value=f;
  g.gain.setValueAtTime(0,t);g.gain.setValueAtTime(v,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.start(t);o.stop(t+d+0.02);
}
function nz(d,v=0.15,lp=600){
  const buf=AC.createBuffer(1,~~(AC.sampleRate*d),AC.sampleRate);
  const dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;
  const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='bandpass';f.frequency.value=lp;f.Q.value=1;
  s.buffer=buf;s.connect(f);f.connect(g);g.connect(sfxGain);
  g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  s.start();s.stop(AC.currentTime+d+0.02);
}

let achieveQueue=[];
function getAchievements(){return loadHS().achievements||[];}
function unlockAchievement(id){
  const hs=loadHS();const list=hs.achievements||[];
  if(list.includes(id))return;
  list.push(id);hs.achievements=list;localStorage.setItem(LS_KEY,JSON.stringify(hs));
  const def=ACHIEVEMENTS.find(a=>a.id===id);
  if(def)achieveQueue.push({name:def.name,desc:def.desc,timer:220});
}
function drawAchievements(){
  achieveQueue=achieveQueue.filter(a=>{
    a.timer--;const alpha=a.timer<40?a.timer/40:1;
    const y=H-160-achieveQueue.indexOf(a)*58;
    ctx.save();ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(10,8,30,0.94)';ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;
    ctx.shadowBlur=14;ctx.shadowColor='#FFD700';
    ctx.beginPath();ctx.roundRect(W-256,y,244,50,10);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='#FFD700';ctx.font='bold 13px "Hiragino Sans","Yu Gothic",monospace';
    ctx.textAlign='left';ctx.fillText('🏆 実績解除: '+a.name,W-246,y+19);
    ctx.fillStyle='rgba(200,200,220,0.9)';ctx.font='10px monospace';
    ctx.fillText(a.desc,W-246,y+38);ctx.restore();
    return a.timer>0;
  });
}

function addDmgNum(x,y,text,color='#FFD700',big=false){
  dmgNums.push({x,y,vy:-2.2-(big?1.5:0),text,color,life:big?75:50,maxLife:big?75:50,big});
}
function drawDmgNums(){
  dmgNums=dmgNums.filter(d=>{
    d.life--;d.y+=d.vy;d.vy*=0.93;
    const a=Math.min(1,d.life/(d.maxLife*0.3))*Math.min(1,d.life/12);
    ctx.save();ctx.globalAlpha=Math.max(0,a);
    const sz=d.big?22+Math.max(0,(d.maxLife-d.life)/d.maxLife*12):14;
    ctx.font=`bold ${sz}px monospace`;
    ctx.textAlign='center';ctx.shadowBlur=d.big?18:8;ctx.shadowColor=d.color;
    ctx.fillStyle=d.color;ctx.fillText(d.text,d.x,d.y);
    ctx.shadowBlur=0;ctx.restore();
    return d.life>0;
  });
}
function addPt(x,y,vx,vy,life,color,size=4,type='circle'){pts.push({x,y,vx,vy,life,maxLife:life,color,size,type});}
function addStar(x,y,vx,vy,life,color,size){addPt(x,y,vx,vy,life,color,size,'star');}
function addDiamond(x,y,vx,vy,life,color,size){addPt(x,y,vx,vy,life,color,size,'diamond');}
function addSpark(x,y,vx,vy,life,color,size){addPt(x,y,vx,vy,life,color,size,'spark');}
function coinBurst(x,y){
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=Math.random()*10+2;addPt(x,y,Math.cos(a)*s,Math.sin(a)*s-4,rand(32,60),'#FFD700',rand(4,10));}
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,s=Math.random()*12+3;addStar(x,y,Math.cos(a)*s,Math.sin(a)*s-5,rand(35,65),'#FFD700',rand(5,9));}
  addPt(x,y,0,0,20,'#fff',90);
}
function hitBurst(x,y,col='#FFD700'){
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,s=Math.random()*8+1;addPt(x,y,Math.cos(a)*s,Math.sin(a)*s-2,rand(20,36),col,rand(3,8));}
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,s=Math.random()*14+4;addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s-3,rand(12,24),col,rand(4,9));}
  addPt(x,y,0,0,16,col,60);
}
function wrongBurst(x,y){
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,s=Math.random()*5+1;addPt(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(14,28),'#4488ff',rand(2,6));}
  for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,s=Math.random()*7+2;addDiamond(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(16,30),'#66aaff',rand(4,7));}
}
function superBurst(x,y){
  const cols=['#FFD700','#ff6600','#ff3300','#fff','#ffcc00','#ff9900','#ffee44'];
  for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,s=Math.random()*18+5;addPt(x,y,Math.cos(a)*s,Math.sin(a)*s-10,rand(45,90),cols[i%cols.length],rand(4,14));}
  for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,s=Math.random()*20+6;addStar(x,y,Math.cos(a)*s,Math.sin(a)*s-8,rand(50,95),'#FFD700',rand(6,12));}
  for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,s=Math.random()*16+4;addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s-6,rand(20,40),'#ffffff',rand(5,10));}
  // リング状エフェクト
  for(let i=0;i<40;i++){const a=(i/40)*Math.PI*2,r=20;addPt(x+Math.cos(a)*r,y+Math.sin(a)*r,Math.cos(a)*12,Math.sin(a)*12,rand(30,55),'#FFD700',rand(3,7));}
}
function comboBurst(x,y,combo){
  const n=Math.min(combo*3,54);const cols=['#FFD700','#ffffff','#ff9900'];
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*12+3;addPt(x,y,Math.cos(a)*s,Math.sin(a)*s-3,rand(25,50),cols[i%cols.length],rand(3,8));}
  const starCols=['#FFD700','#ffffff','#ffee88'];
  for(let i=0;i<Math.min(combo*2,30);i++){const a=Math.random()*Math.PI*2,s=Math.random()*15+4;addStar(x,y,Math.cos(a)*s,Math.sin(a)*s-4,rand(30,60),starCols[i%starCols.length],rand(5,10));}
  for(let i=0;i<Math.min(combo,12);i++){const a=Math.random()*Math.PI*2,s=Math.random()*10+3;addDiamond(x,y,Math.cos(a)*s,Math.sin(a)*s-3,rand(28,55),'#88ffff',rand(4,8));}
}
function wordClearBurst(word,px,py){
  // ワード文字が四方に飛び散る
  const chars=word.split('');const cx=px;const cy=py;
  chars.forEach((ch,i)=>{
    const a=(i/chars.length)*Math.PI*2;const s=rand(4,10);
    addPt(cx,cy,Math.cos(a)*s,Math.sin(a)*s-3,rand(30,50),'#FFD700',0,'text_'+ch);
  });
  // 追加スパーク
  for(let i=0;i<12;i++){const a=Math.random()*Math.PI*2,s=rand(3,9);addSpark(cx,cy,Math.cos(a)*s,Math.sin(a)*s-2,rand(15,30),'#FFD700',rand(3,7));}
  for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2,s=rand(5,12);addStar(cx,cy,Math.cos(a)*s,Math.sin(a)*s-3,rand(20,40),'#ffffff',rand(4,8));}
}
function rand(a,b){return Math.random()*(b-a)+a;}
function lerp(a,b,t){return a+(b-a)*t;}

function addProj(x,y,color){projs.push({x,y,tx:510,ty:185,color:color||'#FFD700'});}
function updateDrawProjs(){
  projs=projs.filter(p=>{
    const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<16){coinBurst(p.tx,p.ty);hitBurst(p.tx-20,p.ty+15,p.color);return false;}
    const spd=18;p.x+=dx/dist*spd;p.y+=dy/dist*spd;
    addPt(p.x+(Math.random()-0.5)*4,p.y+(Math.random()-0.5)*4,(Math.random()-0.5)*0.5,(Math.random()-0.5)*0.5,10,p.color,2.5);
    ctx.shadowBlur=22;ctx.shadowColor=p.color;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;return true;
  });
}
function updatePts(){pts=pts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.vx*=0.96;p.life--;return p.life>0;});}
function drawStar5(cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2;const rad=i%2===0?r:r*0.42;ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);}
  ctx.closePath();ctx.fill();
}
function drawDiamond(cx,cy,r){
  ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r*0.6,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r*0.6,cy);ctx.closePath();ctx.fill();
}
function drawPts(){
  pts.forEach(p=>{
    const a=p.life/p.maxLife;ctx.save();ctx.globalAlpha=a;
    if(p.size>30){
      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1-a)*0.8,0,Math.PI*2);ctx.stroke();
    }else if(p.type==='star'){
      const r=p.size*Math.max(0.2,a);ctx.shadowBlur=10;ctx.shadowColor=p.color;ctx.fillStyle=p.color;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate((1-a)*Math.PI*2);ctx.translate(-p.x,-p.y);
      drawStar5(p.x,p.y,r);ctx.restore();
    }else if(p.type==='diamond'){
      const r=p.size*Math.max(0.2,a);ctx.shadowBlur=8;ctx.shadowColor=p.color;ctx.fillStyle=p.color;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate((1-a)*Math.PI);ctx.translate(-p.x,-p.y);
      drawDiamond(p.x,p.y,r);ctx.restore();
    }else if(p.type==='spark'){
      const len=p.size*a*2;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;const nx=p.vx/spd,ny=p.vy/spd;
      ctx.shadowBlur=8;ctx.shadowColor=p.color;ctx.strokeStyle=p.color;ctx.lineWidth=Math.max(0.5,p.size*a*0.4);
      ctx.beginPath();ctx.moveTo(p.x-nx*len,p.y-ny*len);ctx.lineTo(p.x,p.y);ctx.stroke();
    }else if(p.type&&p.type.startsWith('text_')){
      const ch=p.type.slice(5);const sz=Math.max(6,12*a);
      ctx.shadowBlur=12;ctx.shadowColor=p.color;ctx.fillStyle=p.color;
      ctx.font=`bold ${sz|0}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(ch,p.x,p.y);
    }else{
      ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.restore();
  });
  ctx.globalAlpha=1;
}

function updateFX(){

function drawLightning(x1,y1,x2,y2,alpha=1){

}

// ── ステージ開始 ──
function startStage(idx){
  applyDifficulty(selectedDiff);
  const st=STAGES[idx];const dd=DIFFICULTY_DEFS[selectedDiff];
  G.stageIdx=idx;G.enemyHp=st.enemyHp;G.enemyMaxHp=st.enemyHp;G.dispEnemyHp=st.enemyHp;
  G.atkTimer=st.atkInterval;G.combo=0;G.comboTimer=0;G.comboMax=0;
  G.wrongFlash=0;G.hitstop=0;G.playerHurt=0;G.enemyHurt=0;G.playerAtk=0;
  G.superGauge=0;G.superActive=0;G.superFlash=0;G.isShohouMode=false;G.shohouWord=null;
  G.wpmHistory=[];G.currentWpm=0;G.stageNoDamage=true;G.shohouUsed=false;
  const [lo,hi]=st.wordLevel;
  const pool=[...WORD_DB].slice(lo,hi+1).sort(()=>Math.random()-0.5);
  G.wordQueue=pool.slice(0,st.wordCount).sort((a,b)=>a.word.length-b.word.length);
  G.wordsLeft=G.wordQueue.length;
  nextWord();G.phase='fight';
  G.playerHp=dd.playerHp;G.playerMaxHp=dd.playerHp;G.dispPlayerHp=dd.playerHp;
  stopChip();setBGMPitch(1.0);startBGM();SFX.fight();
  if(idx===4)unlockAchievement('stage5');
}

function nextWord(){
  if(G.wordQueue.length===0){
    const st=STAGES[G.stageIdx];const [lo,hi]=st.wordLevel;
    const pool=[...WORD_DB].slice(lo,hi+1).sort(()=>Math.random()-0.5);
    G.wordQueue=pool.slice(0,Math.min(6,pool.length));
  }
  G.currentWord=G.wordQueue.shift();G.typedIndex=0;G.wrongFlash=0;
  G.wordStartTime=performance.now();G.isShohouMode=false;
}

function startShohouMode(){
  if(G.superGauge<100||G.superActive>0)return;
  const priorities=SHOHOU_WORDS.filter(w=>w.priority);
  let sw;
  if(shohouPriorityIdx<priorities.length){
    sw=priorities[shohouPriorityIdx++];
  }else{
    const rest=SHOHOU_WORDS.filter(w=>!w.priority);
    sw=rest[Math.floor(Math.random()*rest.length)];
  }
  G.isShohouMode=true;G.shohouWord=sw;G.typedIndex=0;G.superActive=1;
}

// ── キャラクター描画：ライオン（学長）MS2強化版 ──
function drawLion(x,y,state='idle'){
  const t=G.frameN;

  // ── アニメーション値計算 ──
  const bob=state==='idle'?Math.sin(t*0.06)*2:0;
  const breathe=state==='idle'?Math.sin(t*0.04)*1.2:0; // 息継ぎ（胸の膨らみ）

  // まばたき：150フレームに1回、8フレームかけて閉じる
  const blinkPhase=t%150;
  const blinkScale=state==='hurt'?0.15:(blinkPhase<8?1-blinkPhase/8:1);

  // 攻撃3フェーズ：G.playerAtkカウンター活用
  let atkOff=0,atkLean=0;
  if(state==='atk'){
    if(G.playerAtk>16){atkOff=-8;atkLean=-0.08;}     // 溜め（引き）
    else if(G.playerAtk>6){atkOff=22;atkLean=0.1;}   // 打ち出し
    else{atkOff=12;atkLean=0.05;}                      // フォロースルー
  }

  // win：ジャンプ
  const winJump=state==='win'?Math.abs(Math.sin(t*0.1))*-18:0;

  ctx.save();ctx.translate(x,y+winJump);
  if(atkLean!==0)ctx.rotate(atkLean);
  ctx.translate(atkOff,0);

  // 影
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.beginPath();ctx.ellipse(0,40,24,7,0,0,Math.PI*2);ctx.fill();

  // 胴体（breatheで幅わずかに変化）
  const bodyG=ctx.createLinearGradient(-14,-40,14,-40);
  bodyG.addColorStop(0,'#1a1a3a');bodyG.addColorStop(0.5,'#2a2a5a');bodyG.addColorStop(1,'#1a1a3a');
  ctx.fillStyle=bodyG;ctx.beginPath();ctx.roundRect(-14-breathe*0.3,-52+bob,28+breathe*0.6,56,4);ctx.fill();

  // 体の黄金タスキ
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(-3,-50+bob);ctx.lineTo(3,-50+bob);ctx.lineTo(2,-18+bob);ctx.lineTo(0,-12+bob);ctx.lineTo(-2,-18+bob);ctx.closePath();ctx.fill();

  // 腕（idleは振り子、atkは状態別）
  const armSwing=state==='atk'?0:Math.sin(t*0.06)*0.12;
  ctx.strokeStyle='#1a1a3a';ctx.lineWidth=11;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-12,-42+bob);ctx.lineTo(-21+Math.cos(armSwing)*8,-28+Math.sin(armSwing)*4+bob);ctx.stroke();
  const rArmX=state==='atk'?(G.playerAtk>16?8:30):20-Math.cos(armSwing)*4;
  const rArmY=state==='atk'?-44:(-28-Math.sin(armSwing)*4)+bob;
  ctx.beginPath();ctx.moveTo(12,-42+bob);ctx.lineTo(rArmX,rArmY);ctx.stroke();
  if(state==='atk'&&G.playerAtk>6&&G.playerAtk<=16){
    // 打ち出しフェーズだけパンチエフェクト
    ctx.shadowBlur=20;ctx.shadowColor='#FFD700';ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(rArmX,rArmY,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  // 脚
  const legSwing=Math.sin(t*0.12)*5;
  ctx.strokeStyle='#111128';ctx.lineWidth=10;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-7,4+bob);ctx.lineTo(-8+legSwing,26+bob);ctx.lineTo(-6+legSwing,40+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(7,4+bob);ctx.lineTo(8-legSwing,26+bob);ctx.lineTo(6-legSwing,40+bob);ctx.stroke();

  // 頭部（顔）
  ctx.translate(0,-62+bob);
  ctx.shadowBlur=8;ctx.shadowColor='#bb7700';ctx.fillStyle='#d88c18';
  for(let i=0;i<13;i++){const a=(i/13)*Math.PI*2,r=20;ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r,8,5.5,a,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;ctx.fillStyle='#bb7010';
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2+0.26,r=17;ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r,5.5,4,a,0,Math.PI*2);ctx.fill();}
  const fg=ctx.createRadialGradient(-3,-4,1,0,0,18);
  fg.addColorStop(0,'#f5c878');fg.addColorStop(0.55,'#e8a850');fg.addColorStop(1,'#c88830');
  ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,17,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,140,80,0.22)';ctx.beginPath();ctx.ellipse(-9,4,6,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(9,4,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0d090';ctx.beginPath();ctx.ellipse(0,7,9,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a1200';ctx.beginPath();ctx.ellipse(0,1,5.5,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,180,120,0.45)';ctx.beginPath();ctx.ellipse(-1.5,0,1.5,0.8,0,0,Math.PI*2);ctx.fill();

  // 目（まばたき対応）
  ctx.fillStyle='#fffbf0';ctx.beginPath();ctx.ellipse(-7,-7,5.5,5*blinkScale,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(7,-7,5.5,5*blinkScale,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7a3800';ctx.beginPath();ctx.ellipse(-7,-7,4,3.5*blinkScale,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(7,-7,4,3.5*blinkScale,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#100600';ctx.beginPath();ctx.ellipse(-7,-7,2.2,2.8*blinkScale,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(7,-7,2.2,2.8*blinkScale,0,0,Math.PI*2);ctx.fill();
  if(blinkScale>0.5){ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();ctx.ellipse(-8,-8.5,1.8,1.4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(8,-8.5,1.8,1.4,0,0,Math.PI*2);ctx.fill();}

  // 眉毛
  ctx.strokeStyle='#3a1a00';ctx.lineWidth=2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-12,-12);ctx.lineTo(-2,-14);ctx.stroke();ctx.beginPath();ctx.moveTo(2,-14);ctx.lineTo(12,-12);ctx.stroke();

function drawEnemy(x,y,state){
  const st=STAGES[G.stageIdx];
  ctx.save();

  // KO倒れアニメ：enemyKoTimerで傾く
  if(state==='ko'&&G.enemyKoTimer>0){
    const t=G.enemyKoTimer;
    const fallRot=Math.min((90-t)/90,1)*1.5; // 最大約85度まで倒れる
    const fallX=Math.min((90-t)/90,1)*40;    // 右に流れる
    ctx.translate(x+fallX,y);ctx.rotate(fallRot);
  } else {
    ctx.translate(x,y);
    // チャージ演出：攻撃前60フレームに前傾み＋グロー
    if(state==='charge'){
      const pulse=Math.sin(G.frameN*0.25)*0.06;
      ctx.rotate(-0.15+pulse);
      ctx.shadowBlur=22+Math.sin(G.frameN*0.2)*8;
      ctx.shadowColor=st.col;
    }
  }

  if(G.stageIdx===0)drawKinoko(0,0,state,STAGES[0].col);
  else if(G.stageIdx===1)drawSagi(0,0,state);
  else if(G.stageIdx===2)drawHoken(0,0,state);
  else if(G.stageIdx===3)drawFP(0,0,state);
  else drawDarkLion(0,0,state);

  // チャージ時：目の発光オーバーレイ
  if(state==='charge'){
    const gAlpha=0.35+Math.sin(G.frameN*0.2)*0.15;
    ctx.shadowBlur=0;ctx.globalAlpha=gAlpha;
    ctx.fillStyle=st.col;ctx.beginPath();ctx.ellipse(-8,-72,7,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,-72,7,6,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

  ctx.fillText('両学長',14,8);ctx.shadowBlur=0;
  // HPバー「どかっ」演出：hpLerpSpeedを一時的に上げて一気に落とす
  if(hpLerpSpeed>0.10){hpLerpSpeed=Math.max(0.10,hpLerpSpeed-0.018);}
  G.dispEnemyHp=lerp(G.dispEnemyHp,G.enemyHp,hpLerpSpeed);
  if(hpBarFlash>0)hpBarFlash--;
  const p2r=Math.max(0,G.dispEnemyHp/G.enemyMaxHp);
  const st=STAGES[G.stageIdx];

let shohouTimer=0;
function drawShohouEffect(){
  if(shohouTimer<=0)return;
  const t=shohouTimer;const maxT=220;
  // フェードイン
  if(t>155){const alpha=Math.min(1,(maxT-t)/65*0.92);ctx.fillStyle=`rgba(0,0,0,${alpha})`;ctx.fillRect(0,0,W,H);}
  // 色フラッシュシーケンス（RGB分離 強化版）
  if(t>158&&t<185){
    const age=185-t;const fl=age/27;
    ctx.save();
    // ドラスティックな色ずれ：R層を右、B層を左に大きくシフト
    ctx.globalAlpha=fl*0.55;ctx.fillStyle='#ff0000';ctx.fillRect(-10,0,W,H);
    ctx.globalAlpha=fl*0.55;ctx.fillStyle='#0000ff';ctx.fillRect(10,0,W,H);
    ctx.globalAlpha=fl*0.35;ctx.fillStyle='#00ff00';ctx.fillRect(0,6,W,H);
    // ノイズライン：走査線ぽい横線
    ctx.globalAlpha=fl*0.2;ctx.fillStyle='#ffffff';
    for(let y=0;y<H;y+=6){ctx.fillRect(0,y,W,1);}
    ctx.restore();
  }
  // 商流発動直後：画面端パルス
  if(t>185&&t<200){
    const fl=(200-t)/15;
    ctx.save();ctx.globalAlpha=fl*0.4;
    const g=ctx.createRadialGradient(W/2,H/2,W*0.1,W/2,H/2,W*0.75);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(255,80,0,1)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();
  }
  // 全方位放射線（2層）
  if(t>100&&t<162){
    const cx=W/2,cy=H/2-20;ctx.save();
    const n=48;
    for(let i=0;i<n;i++){
      const a=(i/n)*Math.PI*2+(G.frameN*0.05);const len=rand(110,280);const alpha=(1-(162-t)/62)*0.72;
      const hue=(i/n)*60+20;
      ctx.strokeStyle=`hsla(${hue},100%,60%,${alpha})`;ctx.lineWidth=1.8;ctx.shadowBlur=16;ctx.shadowColor=`hsl(${hue},100%,50%)`;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*26,cy+Math.sin(a)*26);ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.stroke();
    }
    // 内側の密な線
    for(let i=0;i<24;i++){
      const a=(i/24)*Math.PI*2-(G.frameN*0.03);const len=rand(60,140);const alpha=(1-(162-t)/62)*0.45;
      ctx.strokeStyle=`rgba(255,255,200,${alpha})`;ctx.lineWidth=1;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*10,cy+Math.sin(a)*10);ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.stroke();
    }
    ctx.shadowBlur=0;ctx.restore();
  }
  // 商流拳！テキスト（迫力MAX）
  if(t<135&&t>30){
    const sc=t>118?1+(135-t)/17*2.5:1;const alpha=t<45?(t-30)/15:1;
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(W/2,H/2-20);ctx.scale(sc,sc);ctx.textAlign='center';
    // 影レイヤー（ぶれ感）
    for(let i=0;i<3;i++){
      const ox=(Math.random()-0.5)*6,oy=(Math.random()-0.5)*6;
      ctx.shadowBlur=60;ctx.shadowColor='#ff2200';ctx.fillStyle=`rgba(255,${30+i*20},0,0.4)`;
      ctx.font='bold 76px "Hiragino Sans","Yu Gothic",monospace';ctx.fillText('商流拳！！！',ox,oy);
    }
    ctx.shadowBlur=0;
    // グラデーションテキスト本体
    const grad=ctx.createLinearGradient(0,-40,0,40);
    grad.addColorStop(0,'#ffffff');grad.addColorStop(0.25,'#FFD700');grad.addColorStop(0.7,'#ff8800');grad.addColorStop(1,'#ff3300');
    ctx.shadowBlur=40;ctx.shadowColor='#ffcc00';ctx.fillStyle=grad;
    ctx.font='bold 76px "Hiragino Sans","Yu Gothic",monospace';ctx.fillText('商流拳！！！',0,0);ctx.shadowBlur=0;
    if(sc<1.45){
      // 必殺帯
      ctx.fillStyle='rgba(255,150,0,0.22)';ctx.fillRect(-200,46,400,28);
      ctx.fillStyle='rgba(255,220,100,0.95)';ctx.font='bold 14px monospace';ctx.fillText('── 必殺！商流拳！ ──',0,64);
      // 名言
      if(G.shohouWord&&t<110){
        const qAlpha=Math.min(1,(110-t)/30);ctx.globalAlpha=qAlpha;
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-230,76,460,32);
        ctx.fillStyle='#FFD700';ctx.font='bold 16px "Hiragino Sans","Yu Gothic",monospace';
        ctx.shadowBlur=12;ctx.shadowColor='#ff8800';ctx.fillText(G.shohouWord.jp,0,97);ctx.shadowBlur=0;
        ctx.globalAlpha=1;
      }
    }
    ctx.restore();
  }
  // 三重衝撃波
  if(t<115&&t>60){
    const age=115-t;
    [1,0.6,0.3].forEach((scale,li)=>{
      const r=age*22*scale;const alpha=Math.max(0,(1-age/55)*scale);
      const colors=['rgba(255,180,0','rgba(255,255,180','rgba(255,100,0'];
      ctx.strokeStyle=`${colors[li]},${alpha})`;ctx.lineWidth=(5-li*1.5)*(1-age/55);
      ctx.shadowBlur=28;ctx.shadowColor='#ff9900';
      ctx.beginPath();ctx.arc(W/2,H/2-20,r,0,Math.PI*2);ctx.stroke();
    });
    ctx.shadowBlur=0;
  }
  // パーティクル大量放出
  if(t%2===0&&t>35&&t<165){
    const cols=['#FFD700','#ff9900','#ffffff','#ffcc44','#ff6600'];
    for(let k=0;k<3;k++){
      const a=Math.random()*Math.PI*2,r=rand(10,180);
      addPt(W/2+Math.cos(a)*r,H/2-20+Math.sin(a)*r,(Math.random()-0.5)*9,(Math.random()-0.5)*9-3,rand(25,55),cols[Math.floor(Math.random()*cols.length)],rand(3,10));
    }
  }
  // ヒット時コインが敵→プレイヤーへ流れる
  if(t===90){for(let i=0;i<5;i++)setTimeout(()=>addProj(rand(500,580),rand(170,230),'#FFD700'),i*60);}
  shohouTimer--;
}

  if(lightningTimer>0&&G.combo>=10){
    ctx.globalAlpha=0.08;ctx.fillStyle='#aaccff';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }
  // コンボ10以上：画面端ビートパルス（拍動）
  if(G.combo>=10){
    const beat=Math.sin(G.frameN*0.18)*0.5+0.5; // 約1.7拍/秒
    const pulseA=beat*beat*0.18*Math.min((G.combo-10)/10+0.4,1);
    const hue=G.combo>=20?200:40;

}

// ── メインループ ──
function loop(){
  G.frameN++;updateFX();
  ctx.save();
  if(Math.abs(zoomScale-1)>0.002){ctx.translate(zoomCX,zoomCY);ctx.scale(zoomScale,zoomScale);ctx.translate(-zoomCX,-zoomCY);}
  if(shakePow>0.3)ctx.translate(Math.round(shakeX),Math.round(shakeY));

  if(G.phase==='disclaimer'){
    drawDisclaimer();
  }
  else if(G.phase==='title'){
    drawTitle();drawPts();updatePts();
    if(Math.random()<0.015)coinBurst(Math.random()*W,Math.random()*H*0.5);
  }
  else if(G.phase==='fight'){
    if(G.hitstop>0){G.hitstop--;}
    else{
      G.atkTimer--;
      if(G.atkTimer<=0){
        const st=STAGES[G.stageIdx];G.atkTimer=st.atkInterval;
        G.playerHp=Math.max(0,G.playerHp-st.enemyAtk);
        G.playerHurt=20;G.stageNoDamage=false;
        shake(9);flash('#0044cc',0.45);SFX.enemyAtk();wrongBurst(178,202);
        if(G.playerHp<=0){G.phase='gameover';stopBGM();saveHS(G.score,G.comboMax);startChip('gameover');}
      }
      if(G.comboTimer>0)G.comboTimer--;else if(G.combo>0)G.combo=0;
      if(G.wrongFlash>0)G.wrongFlash--;
      if(G.playerHurt>0)G.playerHurt--;if(G.enemyHurt>0)G.enemyHurt--;if(G.playerAtk>0)G.playerAtk--;
      const targetPitch=G.combo>=15?1.2:G.combo>=10?1.12:G.combo>=5?1.06:1.0;
      setBGMPitch(targetPitch);
    }
    updatePts();drawBG();drawPts();updateDrawProjs();drawDmgNums();
    if(G.enemyKoTimer>0)G.enemyKoTimer--;
    // プレイヤー：ノックバックX＋被ダメフィルター
    const hurtX=G.playerHurt>0?Math.sin(G.playerHurt*0.5)*-14:0;
    const lionState=G.playerAtk>0?'atk':G.playerHurt>0?'hurt':'idle';
    if(G.playerHurt>0&&Math.floor(G.playerHurt/3)%2===0){ctx.save();ctx.filter='brightness(3) sepia(1) hue-rotate(180deg)';drawLion(178+hurtX,222,lionState);ctx.restore();}
    else drawLion(178+hurtX,222,lionState);
    // 敵：チャージ判定・シェイク・KO
    if(enemyTypingShake>0){enemyTypingShake--;}
    const esx=enemyTypingShake>0?(Math.random()-0.5)*4:0;
    const enemyAlive=G.enemyHp>0;
    const enemyState=!enemyAlive?'ko':G.enemyHurt>0?'hurt':G.atkTimer<80?'charge':'idle';
    if(G.enemyHurt>0&&Math.floor(G.enemyHurt/3)%2===0){ctx.save();ctx.filter='brightness(3) saturate(0)';ctx.translate(esx,0);drawEnemy(542,222,enemyState);ctx.restore();}
    else{ctx.translate(esx,0);drawEnemy(542,222,enemyState);ctx.translate(-esx,0);}
    drawHUD();drawWordPanel();drawShohouEffect();
    if(flashA>0.01){ctx.globalAlpha=flashA;ctx.fillStyle=flashC;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
    drawAchievements();drawNonOfficialBadge();
  }
  else if(G.phase==='paused'){drawBG();drawLion(178,222,'idle');drawEnemy(542,222,'idle');drawHUD();drawWordPanel();drawPause();drawAchievements();drawNonOfficialBadge();}
  else if(G.phase==='resuming'){
    drawBG();drawLion(178,222,'idle');drawEnemy(542,222,'idle');drawHUD();drawWordPanel();
    G.resumeCountdown--;
    if(G.resumeCountdown<=0)G.phase='fight';else drawResumeCountdown();
    drawNonOfficialBadge();
  }
  else if(G.phase==='stageclear'){
    drawBG();drawLion(178,222,'win');drawEnemy(542,222,'ko');drawPts();updatePts();drawStageClear();
    if(Math.random()<0.06)coinBurst(Math.random()*W,Math.random()*H*0.5);drawAchievements();drawNonOfficialBadge();
  }
  else if(G.phase==='gameclear'){
    const bg2=ctx.createLinearGradient(0,0,0,H);bg2.addColorStop(0,'#000010');bg2.addColorStop(1,'#001000');ctx.fillStyle=bg2;ctx.fillRect(0,0,W,H);
    drawLion(W/2,285,'win');drawPts();updatePts();drawGameClear();
    if(Math.random()<0.08)coinBurst(Math.random()*W,Math.random()*H*0.6);drawAchievements();drawNonOfficialBadge();
  }
  else if(G.phase==='gameover'){drawBG();drawPts();updatePts();drawGameOver();drawAchievements();drawNonOfficialBadge();}

  ctx.restore();
  requestAnimationFrame(loop);
}

// ── キー入力 ──
function handleKey(key,code){
  AC.resume();
  if(code==='Escape'){
    if(G.phase==='fight'){G.phase='paused';stopBGM();}
    else if(G.phase==='paused'){G.phase='resuming';G.resumeCountdown=180;startBGM();}
    return;
  }
  if(code==='Enter'){
    if(G.phase==='disclaimer'){G.phase='title';startChip('title');return;}
    if(G.phase==='title'){stopChip();shohouPriorityIdx=0;shohouCount=0;startStage(0);}
    else if(G.phase==='stageclear'){
      if(G.stageIdx<STAGES.length-1){stopChip();startStage(G.stageIdx+1);}
      else{stopChip();G.phase='gameclear';SFX.clear();saveHS(G.score,G.comboMax);unlockAchievement('allclear');setTimeout(()=>startChip('clear'),800);}
    }
    else if(G.phase==='gameclear'||G.phase==='gameover'){stopChip();G.playerHp=G.playerMaxHp;G.score=0;G.comboMax=0;G.phase='title';startChip('title');}
    return;
  }
  if(G.phase==='title'){
    const idx=DIFF_OPTS.indexOf(selectedDiff);
    if(code==='ArrowRight'){selectedDiff=DIFF_OPTS[(idx+1)%DIFF_OPTS.length];return;}
    if(code==='ArrowLeft'){selectedDiff=DIFF_OPTS[(idx+DIFF_OPTS.length-1)%DIFF_OPTS.length];return;}
  }
  if(code==='Space'&&G.phase==='fight'&&!G.isShohouMode){
    if(G.superGauge>=100){
      startShohouMode();shohouTimer=200;SFX.shohou();flash('#ff6600',0.85);shake(16);startShohouBGM();
      unlockAchievement('shohou_used');
      shohouCount++;
      if(shohouCount>=3)unlockAchievement('shohou3');
    }
    return;
  }
  if(G.phase!=='fight')return;
  if(G.hitstop>0)return;
  const word=G.isShohouMode?G.shohouWord:G.currentWord;
  if(!word)return;
  if(code==='Backspace'){if(G.typedIndex>0){G.typedIndex--;G.combo=0;G.comboTimer=0;G.wrongFlash=4;}return;}
  if(key.length!==1||!/[a-z0-9\-\/\.,_]/.test(key))return;
  const expected=word.word[G.typedIndex];
  if(key===expected){
    G.typedIndex++;
    SFX.correct(G.typedIndex-1,word.word.length);
    // 1キーごとに実ダメージ（小）
    const keyDmg=Math.max(1,Math.floor(word.dmg/word.word.length));
    G.enemyHp=Math.max(0,G.enemyHp-keyDmg);
    G.enemyHurt=Math.max(G.enemyHurt,5);
    enemyTypingShake=3;
    addDmgNum(rand(510,575),rand(175,240),`-${keyDmg}`,'#FFD700',false);
    if(G.typedIndex>=word.word.length){
      const elapsed=(performance.now()-G.wordStartTime)/1000;
      const wpm=Math.round((word.word.length/5)/(elapsed/60));
      G.wpmHistory.push(wpm);if(G.wpmHistory.length>10)G.wpmHistory.shift();
      G.currentWpm=Math.round(G.wpmHistory.reduce((a,b)=>a+b,0)/G.wpmHistory.length);
      if(G.currentWpm>=60)unlockAchievement('wpm60');
      if(G.currentWpm>=80)unlockAchievement('wpm80');
      if(G.currentWpm>=100)unlockAchievement('wpm100');
      const comboBonus=Math.min(G.combo,10)*4;
      // per-key分は既に引いてあるので、残り（コンボボーナス＋フィニッシュボーナス）を追加
      const perKeyDealt=Math.floor(word.dmg/word.word.length)*word.word.length;
      const finishBonus=word.dmg-perKeyDealt+comboBonus; // 端数＋コンボ
      let dmg=Math.max(finishBonus,comboBonus+5);
      const isShohouFinish=G.isShohouMode;
      if(G.isShohouMode){
        // 商流拳：残りHPの大部分をどかっと削る
        dmg=Math.max(Math.floor(G.enemyMaxHp*0.62),G.enemyHp-1);
        G.isShohouMode=false;G.shohouWord=null;G.superGauge=0;G.superActive=0;
        stopShohouBGM();
        zoomTargetScale=1.65;zoomCX=540;zoomCY=200;setTimeout(()=>zoomTargetScale=1.0,1600);
        shake(34);flash('#ff8800',1.0);
        superBurst(540,200);
        // HPバー「どかっ」演出
        hpLerpSpeed=0.45;hpBarFlash=30;
      }
      G.enemyHp=Math.max(0,G.enemyHp-dmg);G.score+=dmg*10*(1+G.combo*0.1|0);
      // ワードクリアのダメージ数字（大）
      if(isShohouFinish){
        addDmgNum(542,155,'CRITICAL!!','#ffffff',true);
        addDmgNum(542,188,`-${dmg}`,'#FFD700',true);
        setTimeout(()=>addDmgNum(542,220,'商流拳！！','#ff9900',true),160);
      }else{
        addDmgNum(rand(510,575),rand(160,200),`-${dmg}`,'#ff6600',true);
      }
      G.combo++;G.comboTimer=120;G.comboMax=Math.max(G.comboMax,G.combo);
      G.playerAtk=20;G.enemyHurt=22;G.hitstop=6;
      shake(6);flash('#FFD700',0.42);SFX.wordClear();
      wordClearBurst(word.word,W/2,H-110);
      // ワードクリアでもHPバーに軽いフラッシュ
      hpBarFlash=Math.max(hpBarFlash,12);hpLerpSpeed=Math.max(hpLerpSpeed,0.22);
      addProj(220,185,'#FFD700');
      // コンボマイルストーン
      if(G.combo===10){SFX.combo10();comboBurst(W/2,H/2,10);unlockAchievement('combo10');}
      if(G.combo===20){comboBurst(W/2,H/2,20);flash('#88ffaa',0.5);unlockAchievement('combo20');}
      if(G.combo===30){comboBurst(W/2,H/2,30);flash('#FFD700',0.6);shake(12);unlockAchievement('combo30');}
      if(G.combo===50){comboBurst(W/2,H/2,50);flash('#ffffff',0.8);shake(20);unlockAchievement('combo50');}
      const prevGauge=G.superGauge;
      G.superGauge=Math.min(100,G.superGauge+14+Math.min(G.combo,6)*4);
      if(prevGauge<100&&G.superGauge>=100)SFX.gaugeFull();
      if(G.enemyHp<=0){
        G.currentWord=null;G.shohouWord=null;G.isShohouMode=false;
        stopShohouBGM();
        SFX.ko();shake(22);flash('#FFD700',0.92);G.enemyKoTimer=90;
        unlockAchievement('first_kill');
        if(G.stageNoDamage)unlockAchievement('nodamage');
        for(let i=0;i<24;i++)setTimeout(()=>coinBurst(Math.random()*W,Math.random()*H*0.5),i*75);
        setBGMPitch(1.0);stopBGM();
        setTimeout(()=>{G.phase='stageclear';SFX.stageClear();startChip('clear');},1300);
      }else{nextWord();}
    }
  }else{
    G.wrongFlash=14;G.combo=0;G.comboTimer=0;shake(5);SFX.wrong();wrongBurst(W/2,H-90);
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&G.phase==='fight')e.preventDefault();
  handleKey(e.key.toLowerCase(),e.code);
});
const mobileInput=document.getElementById('mobileInput');
mobileInput.addEventListener('input',e=>{
  const val=e.data;if(!val)return;
  AC.resume();handleKey(val.toLowerCase(),'Key'+val.toUpperCase());mobileInput.value='';
});
mobileInput.addEventListener('keydown',e=>{
  if(e.key==='Backspace'||e.key==='Enter'){e.stopPropagation();AC.resume();handleKey(e.key.toLowerCase(),e.code||e.key);}
});
cvs.addEventListener('click',e=>{
  AC.resume();mobileInput.focus();
  if(G.phase==='disclaimer'){G.phase='title';startChip('title');return;}
  if(G.phase==='title'){
    const rect=cvs.getBoundingClientRect();const scaleX=W/rect.width,scaleY=H/rect.height;
    const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
    const btnW=92,btnH=30,btnY=H/2+66,gap=12;const totalBtnW=DIFF_OPTS.length*(btnW+gap)-gap;
    let clicked=false;
    DIFF_OPTS.forEach((d,i)=>{const bx=W/2-totalBtnW/2+i*(btnW+gap);if(mx>=bx&&mx<=bx+btnW&&my>=btnY&&my<=btnY+btnH){selectedDiff=d;clicked=true;}});
    if(!clicked){shohouPriorityIdx=0;shohouCount=0;startStage(0);}
  }
});

// タイトル画面チップチューンを起動
startChip('title');
loop();
</script>
